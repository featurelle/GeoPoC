<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoPoC</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
</head>
<body>
<h1>GeoPoC - Long Polling Test</h1>
<div id="status">Status: <span id="statusText">Initializing...</span></div>

<script>
    const POLL_INTERVAL = 5000; // 5 seconds
    const history = [];

    // --- In-page logging UI ---
    const logDiv = document.createElement('pre');
    logDiv.style.position = 'fixed';
    logDiv.style.bottom = '0';
    logDiv.style.left = '0';
    logDiv.style.width = '100%';
    logDiv.style.maxHeight = '30vh';
    logDiv.style.overflow = 'auto';
    logDiv.style.background = '#000';
    logDiv.style.color = '#0f0';
    logDiv.style.fontSize = '10px';
    document.body.appendChild(logDiv);

    function log(...args) {
        const msg = args.join(' ') + '\n';
        logDiv.textContent += msg;
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(msg);
    }

    function updateStatus(text) {
        document.getElementById('statusText').textContent = text;
    }

    // Request wake lock to prevent screen sleep
    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try {
                await navigator.wakeLock.request('screen');
                log('Wake Lock active');
            } catch (e) {
                log('Wake Lock failed:', e.message);
            }
        }
    }

    // Long polling loop
    async function pollLocation() {
        if (!('geolocation' in navigator)) {
            log('Geolocation not supported');
            updateStatus('Geolocation not supported');
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (position) => {
                const data = {
                    lat: position.coords.latitude,
                    lng: position.coords.longitude,
                    accuracy: position.coords.accuracy,
                    timestamp: new Date().toLocaleTimeString()
                };
                history.push(data);
                log(`#${history.length} ${data.lat.toFixed(6)}, ${data.lng.toFixed(6)} (±${data.accuracy.toFixed(1)}m) ${data.timestamp}`);
                updateStatus(`#${history.length} | ${data.lat.toFixed(4)}, ${data.lng.toFixed(4)} | ±${data.accuracy.toFixed(0)}m`);
                setTimeout(pollLocation, POLL_INTERVAL);
            },
            (err) => {
                log(`Error ${err.code}: ${err.message}`);
                updateStatus('Error - retrying...');
                setTimeout(pollLocation, POLL_INTERVAL);
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    }

    // Service worker (optional - remove if getting 404 on GitHub Pages)
    // if ('serviceWorker' in navigator) {
    //     navigator.serviceWorker.register('/service-worker.js')
    //         .then(() => log('SW registered'))
    //         .catch(err => log('SW failed', err));
    // }

    // Auto-start on page load
    document.addEventListener('DOMContentLoaded', async () => {
        log('=== GeoPoC Started ===');
        await requestWakeLock();
        updateStatus('Starting...');
        pollLocation();
    });
</script>
</body>
</html>
